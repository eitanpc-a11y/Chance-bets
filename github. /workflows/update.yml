name: שאיבת תוצאות צ'אנס אוטומטית

on:
  schedule:
    # מפעל הפיס מפרסם תוצאות צ'אנס כל שעה לערך
    # מריץ כל שעה בין 8:00 ל-23:00 (UTC = IL -3)
    - cron: '5 5-20 * * *'
  workflow_dispatch:
    inputs:
      force_simulate:
        description: 'Force simulated data (for testing)'
        required: false
        default: 'false'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4 lxml
          playwright install chromium --with-deps

      - name: Run scraper
        run: python fetch_results.py
        timeout-minutes: 5

      - name: Commit & push data
        run: |
          git config --global user.name  'Chance Bot 🤖'
          git config --global user.email 'bot@chance-analytics.local'
          git add data.json debug_pais.png || true
          git diff --staged --quiet || git commit -m "📊 עדכון נתוני צ'אנס — $(date '+%Y-%m-%d %H:%M')"
          git push
