<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דשבורד צ'אנס - סטטיסטיקות</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .stats-cards {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .card {
            background: #eef2f3;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            width: 30%;
            font-size: 1.2em;
        }
        .card span {
            display: block;
            font-size: 1.5em;
            font-weight: bold;
            color: #e74c3c;
            margin-top: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: center;
        }
        th, td {
            padding: 15px;
            border: 1px solid #ddd;
        }
        th {
            background-color: #2c3e50;
            color: white;
            font-size: 1.2em;
        }
        td {
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🃏 דשבורד סטטיסטיקות ומפות חום - צ'אנס</h1>
    
    <div class="stats-cards">
        <div class="card">סה"כ הגרלות שנותחו <span id="total-draws">0</span></div>
        <div class="card">הקלף הנפוץ בלב ♥ <span id="top-heart">-</span></div>
        <div class="card">הקלף הנפוץ בעלה ♣ <span id="top-spade">-</span></div>
    </div>

    <h2>🔥 מפת חום: תדירות הופעת קלפים לפי סדרה</h2>
    <p>תאים אדומים וכהים יותר מציינים קלפים שהוגרלו יותר פעמים.</p>
    
    <table id="heatmap-table">
        <thead>
            <tr>
                <th>קלף</th>
                <th>♠ תלתן</th>
                <th>♥ לב</th>
                <th>♦ יהלום</th>
                <th>♣ עלה</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // 1. הגדרת הסדרות והקלפים
    const suits = ['spade', 'heart', 'diamond', 'club'];
    const suitSymbols = ['♠', '♥', '♦', '♣'];
    const cards = ['7', '8', '9', '10', 'J', 'Q', 'K', 'A'];

    // 2. יצירת מבנה נתונים לאחסון הספירות
    let counts = {
        'spade': {}, 'heart': {}, 'diamond': {}, 'club': {}
    };
    
    // איפוס ספירות ל-0
    suits.forEach(suit => {
        cards.forEach(card => counts[suit][card] = 0);
    });

    // 3. סימולציה של 500 הגרלות (Mock Data)
    const totalDraws = 500;
    for(let i = 0; i < totalDraws; i++) {
        suits.forEach(suit => {
            let randomCard = cards[Math.floor(Math.random() * cards.length)];
            counts[suit][randomCard]++;
        });
    }

    // 4. עדכון כרטיסיות הסטטיסטיקה למעלה
    document.getElementById('total-draws').innerText = totalDraws;
    
    // מציאת הקלף הנפוץ בלב
    let maxHeartCard = Object.keys(counts['heart']).reduce((a, b) => counts['heart'][a] > counts['heart'][b] ? a : b);
    document.getElementById('top-heart').innerText = maxHeartCard;

    // מציאת הקלף הנפוץ בעלה
    let maxSpadeCard = Object.keys(counts['club']).reduce((a, b) => counts['club'][a] > counts['club'][b] ? a : b);
    document.getElementById('top-spade').innerText = maxSpadeCard;

    // 5. בניית טבלת מפת החום (Heatmap)
    const tbody = document.querySelector('#heatmap-table tbody');
    let maxCount = 0;

    // מציאת המספר הגבוה ביותר כדי לחשב עוצמת צבע
    suits.forEach(suit => {
        cards.forEach(card => {
            if(counts[suit][card] > maxCount) maxCount = counts[suit][card];
        });
    });

    // יצירת השורות בטבלה
    cards.forEach(card => {
        let row = document.createElement('tr');
        
        // עמודת שם הקלף
        let cardCell = document.createElement('td');
        cardCell.innerText = card;
        cardCell.style.backgroundColor = '#ecf0f1';
        row.appendChild(cardCell);

        // תאי הנתונים (הסדרות)
        suits.forEach(suit => {
            let cell = document.createElement('td');
            let count = counts[suit][card];
            cell.innerText = count;
            
            // חישוב צבע האדום בהתאם לכמות (Heatmap logic)
            let intensity = count / maxCount; 
            let alpha = intensity * 0.8; // שקיפות מקסימלית 0.8 כדי שיהיה אפשר לקרוא את הטקסט
            cell.style.backgroundColor = `rgba(231, 76, 60, ${alpha})`;
            
            // צבע טקסט לבן אם הרקע כהה מדי
            if(intensity > 0.6) cell.style.color = 'white';

            row.appendChild(cell);
        });

        tbody.appendChild(row);
    });
</script>

</body>
</html>
