name: שאיבת תוצאות צ'אנס אוטומטית (מתקדם)

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: משיכת קוד המקור
        uses: actions/checkout@v3

      - name: הגדרת סביבת Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: התקנת ספריות ודפדפן Playwright
        run: |
          pip install playwright bs4
          playwright install chromium

      - name: הרצת סקריפט משיכת הנתונים האמיתיים
        run: python fetch_results.py

      - name: שמירת הנתונים למאגר
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data.json
          git commit -m "עדכון נתוני אמת ממשק הפיס + אנליטיקה 🤖" || echo "אין שינויים חדשים לשמור"
          git push
